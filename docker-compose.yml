services:

  postgres:
    image: postgres:16
    container_name: cafemanager-postgres
    restart: always

    environment:
      POSTGRES_DB: cafemanager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


  api:
    build: .
    container_name: cafemanager-api
    restart: always

    depends_on:
      - postgres

    ports:
      - "8080:8080"

    environment:
      DB_URL: jdbc:postgresql://postgres:5432/cafemanager
      DB_USER: postgres
      DB_PASSWORD: postgres

      JWT_SECRET: MiClaveSuperSecretaCafeManager2026JWT123456789
      JWT_EXPIRATION: 86400000

      SPRING_PROFILES_ACTIVE: prod


volumes:
  postgres_data: